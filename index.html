<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anatomy Atlas | Oystraz Digital Twin</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; }
        #ui-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 15px; color: white; text-align: center; border: 1px solid #444; z-index: 100;
        }
        #legend {
            position: absolute; top: 20px; right: 20px; width: 220px;
            background: rgba(0, 0, 0, 0.7); color: #ddd; padding: 15px;
            border-radius: 10px; font-size: 13px; border-left: 4px solid #4facfe; z-index: 100;
        }
        .category { font-weight: bold; color: #4facfe; margin-top: 10px; display: block; }
        #tooltip {
            position: absolute; display: none; background: white; color: black;
            padding: 6px 12px; border-radius: 4px; font-weight: bold; font-size: 14px;
            pointer-events: none; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        input[type=range] { width: 300px; cursor: pointer; }
    </style>
</head>
<body>

<div id="tooltip"></div>

<div id="legend">
    <b style="font-size: 16px; color: white;">Anatomy Legend</b>
    <span class="category">Core Nuclei</span> Thalamus, Caudate, Putamen
    <span class="category">Limbic System</span> Hippocampus, Amygdala
    <span class="category">Motor/Life</span> Cerebellum, Brain-Stem
    <span class="category">Connective</span> Corpus Callosum
    <span class="category">Glass Shell</span> Cerebral Cortex (Semi-Transparent)
</div>

<div id="ui-panel">
    <div style="margin-bottom: 8px;">Explosion Factor: <span id="val">0</span>%</div>
    <input type="range" id="slider" min="0" max="100" value="0">
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, brainGroup;
    let hoveredObject = null;
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const tooltip = document.getElementById('tooltip');

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.set(0, 150, 450);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Bright Studio Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 2.0));
        const sun = new THREE.DirectionalLight(0xffffff, 2.0);
        sun.position.set(100, 200, 100);
        scene.add(sun);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        new GLTFLoader().load('./Brain_Parts.glb', (gltf) => {
            brainGroup = gltf.scene;
            scene.add(brainGroup);

            const box = new THREE.Box3().setFromObject(brainGroup);
            const center = box.getCenter(new THREE.Vector3());
            brainGroup.position.sub(center);

            brainGroup.traverse((child) => {
                if (child.isMesh) {
                    console.log("Checking Part:", child.name); // DEBUG: Look at names in F12 Console
                    
                    child.userData.origPos = child.position.clone();
                    const pCenter = new THREE.Box3().setFromObject(child).getCenter(new THREE.Vector3());
                    child.userData.dir = new THREE.Vector3().subVectors(pCenter, center).normalize();

                    // --- DETAILED MATERIAL RE-INJECTION ---
                    const isShell = /(cortex|pial)/i.test(child.name) && !child.name.toLowerCase().includes('cerebellum');
                    
                    if (isShell) {
                        // Creating a brand new material to avoid sharing with core parts
                        child.material = new THREE.MeshStandardMaterial({
                            color: 0xcccccc,
                            transparent: true,
                            opacity: 0.12,
                            depthWrite: false, // Prevents shell from blocking depth of internal parts
                            side: THREE.DoubleSide
                        });
                        child.userData.isShell = true;
                        child.renderOrder = 1; // Render shell first/behind
                    } else {
                        // Standardize core part materials
                        const originalColor = child.material.color.clone();
                        child.material = new THREE.MeshStandardMaterial({
                            color: originalColor,
                            transparent: false,
                            opacity: 1.0,
                            metalness: 0.2,
                            roughness: 0.6,
                            emissive: new THREE.Color(0x000000),
                            emissiveIntensity: 0
                        });
                        child.userData.isShell = false;
                        child.renderOrder = 2; // Render internals on top
                    }
                }
            });
        });

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            tooltip.style.left = (e.clientX + 15) + 'px';
            tooltip.style.top = (e.clientY + 15) + 'px';
        });

        animate();
    }

    function handleHover() {
        if (!brainGroup) return;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(brainGroup.children, true);

        // 1. Reset previous highlight
        if (hoveredObject) {
            hoveredObject.material.emissiveIntensity = 0;
            hoveredObject = null;
            tooltip.style.display = 'none';
        }

        // 2. Optimized Selection Loop
        if (intersects.length > 0) {
            let target = null;
            for (let i = 0; i < intersects.length; i++) {
                // SKIP any mesh marked as shell
                if (intersects[i].object.userData.isShell === true) continue;
                
                target = intersects[i].object;
                break; // Found the first solid internal part
            }

            if (target) {
                hoveredObject = target;
                hoveredObject.material.emissive.set(0x4facfe); // High-contrast blue
                hoveredObject.material.emissiveIntensity = 1.0;
                
                tooltip.style.display = 'block';
                tooltip.innerText = target.name.replace(/_/g, ' ');
            }
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        handleHover();
        controls.update();
        renderer.render(scene, camera);
    }

    // Explosion Logic
    document.getElementById('slider').addEventListener('input', (e) => {
        const val = e.target.value;
        document.getElementById('val').innerText = val;
        if (!brainGroup) return;
        brainGroup.traverse((child) => {
            if (child.isMesh && child.userData.origPos) {
                const move = child.userData.dir.clone().multiplyScalar(val * 1.5);
                child.position.copy(child.userData.origPos).add(move);
            }
        });
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
